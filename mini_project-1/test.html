<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>AES Decrypt</title>
</head>
<body>
<h2>Giải mã AES-GCM</h2>

<p>Mật khẩu:</p>
<input id="password" type="password" value="WORLDCUP2026">

<p>IV:</p>
<input id="iv" size="60" value="n9xk1Sduo9NLU18z">

<p>Ciphertext:</p>
<textarea id="ciphertext" rows="5" cols="80">sdEj/IrjrahGkbD46ZHmMAc+GSRMSOLPPO7fK7hXGNmVWmMiz/LwFoK8FpQ1B/Q=</textarea>

<br><br>
<button onclick="decryptAES()">Giải mã</button>

<p>Kết quả:</p>
<textarea id="result" rows="4" cols="80"></textarea>

<script>
function base64ToBytes(base64) {
const binary = atob(base64);
const bytes = new Uint8Array(binary.length);

for (let i = 0; i < binary.length; i++) {
bytes[i] = binary.charCodeAt(i);
}

return bytes;
}

async function decryptAES() {
try {
const password = document.getElementById("password").value;
const ivBase64 = document.getElementById("iv").value;
const ciphertextBase64 = document.getElementById("ciphertext").value;

const encoder = new TextEncoder();
const decoder = new TextDecoder();

const keyMaterial = await crypto.subtle.digest(
"SHA-256",
encoder.encode(password)
);

const key = await crypto.subtle.importKey(
"raw",
keyMaterial,
{ name: "AES-GCM" },
false,
["decrypt"]
);

const iv = base64ToBytes(ivBase64);
const ciphertext = base64ToBytes(ciphertextBase64);

const decrypted = await crypto.subtle.decrypt(
{
name: "AES-GCM",
iv: iv
},
key,
ciphertext
);

document.getElementById("result").value = decoder.decode(decrypted);
} catch (error) {
document.getElementById("result").value =
"Giải mã thất bại. Sai mật khẩu, IV hoặc ciphertext.";
}
}
</script>
</body>
</html>
